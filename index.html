<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>drone-control</title>
  <script type="module" src="/src/main.js"></script>
</head>
<body>

  <div id="info">drone-control | Three.js Drone Simulator</div>

  <div id="toolbar" aria-label="Tool controls">
    <label for="camera-mode">Camera</label>
    <select id="camera-mode">
      <option value="chase">Chase</option>
      <option value="fpv">FPV</option>
      <option value="top">Top</option>
    </select>
    <label for="channel-map">Channel Map</label>
    <select id="channel-map">
      <option value="AETR">AETR</option>
      <option value="TAER">TAER</option>
    </select>
    <button id="reset-button" type="button">Reset Drone</button>
    <button id="open-math" class="icon-button" type="button" aria-haspopup="dialog" aria-controls="math-modal" aria-label="Explain the math">💡</button>
  </div>

  <canvas id="canvas"></canvas>

  <div id="hud">
    <div id="gamepad-status">Gamepad: none (keyboard fallback active)</div>
    <div id="telemetry">ALT 0.0 m | SPD 0.0 m/s</div>
    <div id="sticks">
      <div class="stick" title="Throttle / Yaw"><div class="stick-dot" id="stick-left"></div></div>
      <div class="stick" title="Pitch / Roll"><div class="stick-dot" id="stick-right"></div></div>
    </div>
    <div id="help-text">
      Keyboard: W/S throttle, A/D yaw, Arrow keys pitch/roll, R reset.
      RadioMaster: plug in via USB and select "USB Joystick (HID)".
    </div>
  </div>

  <div id="crash-banner" hidden>CRASHED — resetting...</div>

  <div id="math-modal" role="dialog" aria-modal="true" aria-labelledby="math-title" hidden>
    <div class="modal-panel">
      <div class="modal-header">
        <h2 id="math-title">Math Behind the Scene</h2>
        <div class="modal-actions">
          <button id="language-toggle" class="modal-toggle" type="button">Eng/中</button>
          <button id="close-math" class="modal-toggle" type="button" aria-label="Close">Close</button>
        </div>
      </div>
      <div id="math-content" class="modal-body"></div>
    </div>
  </div>

</body>
</html>
